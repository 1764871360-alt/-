<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#062846">
  <title>蓝湾潜水｜三亚多语言预约演示站</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 70% 20%,#27c7e8 0,transparent 28%),linear-gradient(135deg,#062846,#0877df);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.box{text-align:center;padding:34px}.wave{width:62px;height:62px;margin:0 auto 18px;border-radius:20px;display:grid;place-items:center;background:rgba(255,255,255,.16);font-size:32px;animation:pulse 1.4s infinite}.box h1{font-size:24px;margin:0 0 8px}.box p{margin:0;color:rgba(255,255,255,.75)}.bar{width:240px;height:6px;margin:24px auto 0;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.18)}.bar i{display:block;width:42%;height:100%;border-radius:inherit;background:#fff;animation:load 1.2s ease-in-out infinite}@keyframes load{0%{transform:translateX(-110%)}100%{transform:translateX(350%)}}@keyframes pulse{50%{transform:scale(1.06)}}
  </style>
</head>
<body>
  <div class="box"><div class="wave">≈</div><h1>正在打开多语言预约样站</h1><p>Loading the interactive demo…</p><div class="bar"><i></i></div></div>
  <script>
    (async()=>{
      try{
        const names=['p0.txt','p1.txt','p2.txt','p3.txt','p4.txt'];
        const parts=await Promise.all(names.map(n=>fetch(n+'?v=1').then(r=>{if(!r.ok)throw new Error(n);return r.text()})));
        const raw=atob(parts.join('').trim());
        const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));
        if(!('DecompressionStream' in window))throw new Error('browser');
        const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        const html=await new Response(stream).text();
        document.open();document.write(html);document.close();
      }catch(e){
        document.querySelector('.box').innerHTML='<div class="wave">!</div><h1>样站加载失败</h1><p>请使用最新版 Chrome、Edge 或 Safari 重新打开。</p>';
      }
    })();
  </script>
</body>
</html>
